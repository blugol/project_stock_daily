<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>종목 연동 테스트</title>
</head>
<body>
    <h1 id="stockName">종목을 선택해주세요...</h1>
    
    <h3>수신된 원시 데이터 (Raw JSON)</h3>
    <pre id="rawData" style="background-color: #eee; padding: 10px; border: 1px solid #ccc; white-space: pre-wrap; word-wrap: break-word;">
데이터 대기 중...
    </pre>

    <script>
        const stockNameElement = document.getElementById('stockName');
        const rawDataElement = document.getElementById('rawData');
        let ws;
        
        function connect() {
            ws = new WebSocket('ws://localhost:8765');
            
            ws.onopen = () => {
                console.log('웹소켓 서버 연결됨');
                stockNameElement.innerText = "연결 완료. HTS에서 종목을 선택해보세요.";
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // 종목명 텍스트로 표시
                stockNameElement.innerText = "종목명: " + data.stock_name;
                
                // 수신된 모든 데이터를 가공 없이 그대로 화면에 텍스트(JSON)로 뿌림
                rawDataElement.innerText = JSON.stringify(data, null, 2);
            };
            
            ws.onclose = () => {
                console.log('연결 끊김, 재연결 시도...');
                stockNameElement.innerText = "서버와 연결이 끊어졌습니다. 재연결 중...";
                setTimeout(connect, 3000);
            };
        }

        connect();
    </script>
</body>
</html>
