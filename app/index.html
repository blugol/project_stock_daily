<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HTS 현재 종목</title>
</head>
<body>
    <h1 id="stockName">종목을 선택해주세요...</h1>
    <pre id="rawOutput" style="white-space: pre-wrap; word-wrap: break-word;"></pre>

    <script>
        const stockNameElement = document.getElementById('stockName');
        const rawOutputElement = document.getElementById('rawOutput');
        let ws;
        
        function connect() {
            ws = new WebSocket('ws://localhost:8765');
            
            ws.onopen = () => {
                console.log('웹소켓 서버 연결됨');
                stockNameElement.innerText = "연결 완료. HTS에서 종목을 선택해보세요.";
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                stockNameElement.innerText = "종목명: " + data.stock_name;
                if (data.shareholders) {
                    rawOutputElement.innerText = data.shareholders;
                } else {
                    rawOutputElement.innerText = "대기 중...";
                }
            };
            
            ws.onclose = () => {
                console.log('연결 끊김, 3초 후 재연결 시도...');
                stockNameElement.innerText = "서버와 연결이 끊어졌습니다. 재연결 중...";
                setTimeout(connect, 3000);
            };

            ws.onerror = (error) => {
                console.error('웹소켓 에러: ', error);
            };
        }

        connect();
    </script>
</body>
</html>
